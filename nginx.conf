server {
    listen 80;
    server_name localhost;

    # Otimizações para transferência de arquivos (AppHub)
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 0;

    # Timeouts aumentados para uploads grandes
    client_body_timeout 300s;
    client_header_timeout 300s;

    location /apphub/api/ {
        
        # Desabilitar buffer para upload rápido (streaming direto)
        proxy_request_buffering off;
        proxy_buffering off;
        
        # Timeouts longos para arquivos grandes
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;

        proxy_pass http://apphub-backend:5002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /apphub/uploads/ {
        # Otimizações para download rápido
        proxy_request_buffering off;
        proxy_buffering off;
        sendfile on;
        tcp_nopush on;
        
        proxy_pass http://apphub-backend:5002/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /apphub/ {
        proxy_pass http://apphub-frontend:5175;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://apple_academy_backend:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads {
        proxy_pass http://apple_academy_backend:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
